<!DOCTYPE html>
<html>
<head>
    <title>Selenium Mission Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        #dropZone {
            width: 200px;
            height: 200px;
            border: 3px dashed black;
            margin: 20px auto;
            position: relative;
        }

        .circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: red;
            display: inline-block;
            margin: 10px;
            cursor: grab;
        }

        .square {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            margin: 20px auto;
            position: relative;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid green;
            position: absolute;
            top: 25px;
            left: 25px;
            display: none;
        }

        iframe {
            width: 80%;
            height: 300px;
            border: 2px solid black;
            margin-top: 20px;
            display: none;
        }
    </style>

    <script>
        function startMission() {
            let level = prompt("Enter Level:");
            if(level === "level1") {
                window.open("level2.html", "_blank");
            }
        }

        function enableTriangle() {
            document.getElementById("triangle").style.display = "block";
        }

        function level3Complete() {
            document.getElementById("level3").innerText = "Level 3 Completed!";
            document.getElementById("formFrame").style.display = "block";
        }

  
    </script>
</head>

<body>

<h1>🎯 Selenium Mission Game</h1>

<button onclick="startMission()">Start Mission</button>

<hr>

<h2>Drag & Drop Section</h2>

<div class="circle" id="circle" draggable="true"
     ondragstart="event.dataTransfer.setData('text','circle')"></div>

<div id="dropZone"
     ondrop="enableTriangle(); event.preventDefault();"
     ondragover="event.preventDefault();">
    Drop Circle Here
</div>

<div class="square" id="square"
     ondrop="level3Complete(); event.preventDefault();"
     ondragover="event.preventDefault();">
    Drop Triangle Here
    <div class="triangle" id="triangle" draggable="true"
         ondragstart="event.dataTransfer.setData('text','triangle')"></div>
</div>

<h2 id="level3"></h2>

<iframe id="formFrame" src="form.html"></iframe>


</body>
</html>
